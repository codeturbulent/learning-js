<!DOCTYPE html>
<html>
<head>
    <title>API Test Suite</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        .test-card { border: 1px solid #333; margin-bottom: 10px; padding: 10px; border-radius: 4px; }
        .test-card.loading { border-left: 4px solid #ce9178; }
        .test-card.success { border-left: 4px solid #4ec9b0; }
        .test-card.error { border-left: 4px solid #f44747; }
        .header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
        .tag { background: #333; padding: 2px 6px; border-radius: 3px; font-size: 0.8em; }
        .content { white-space: pre-wrap; word-break: break-all; margin-top: 10px; color: #9cdcfe; }
        button { background: #0e639c; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-bottom: 20px; }
        button:hover { background: #1177bb; }
    </style>
</head>
<body>
    <h1>API Thorough Test Suite</h1>
    <button onclick="runAllTests()">Run All Tests</button>
    <div id="results"></div>

    <script>
        const models = ["gemini", "openai"];
        const systemTypes = ["chat", "voice", "advanced chat", "advanced voice", "clarification"];
        
        async function runAllTests() {
            document.getElementById('results').innerHTML = '';
            for (const model of models) {
                for (const systemType of systemTypes) {
                    await runTest(model, systemType);
                }
            }
        }

        async function runTest(modeltype, systemtype) {
            const resultId = `test-${modeltype}-${systemtype.replace(' ', '-')}`;
            const container = document.createElement('div');
            container.className = 'test-card loading';
            container.id = resultId;
            container.innerHTML = `
                <div class="header">
                    <span>${modeltype.toUpperCase()} - ${systemtype.toUpperCase()}</span>
                    <span class="tag">Testing...</span>
                </div>
                <div class="content" id="${resultId}-content">Initializing...</div>
            `;
            document.getElementById('results').appendChild(container);

            const contentDiv = document.getElementById(`${resultId}-content`);
            const tagSpan = container.querySelector('.tag');

            const isStreaming = systemtype === "chat" || systemtype === "advanced chat";
            const payload = {
                modeltype,
                systemtype,
                input: systemtype.includes("voice") ? "Go to page 5" : "what is on page 10",
                userinstruction: "a helpful assistant",
                depth: "deep"
            };

            try {
                const response = await fetch("http://localhost:5050", {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                if (isStreaming) {
                    contentDiv.innerHTML = "";
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.replace('data: ', ''));
                                    if (data.text) contentDiv.innerHTML += data.text;
                                } catch (e) {
                                    if (line.includes('[DONE]')) break;
                                }
                            }
                        }
                    }
                } else {
                    const data = await response.json();
                    contentDiv.innerHTML = JSON.stringify(data, null, 2);
                }

                container.className = 'test-card success';
                tagSpan.innerText = 'PASS';
            } catch (err) {
                container.className = 'test-card error';
                tagSpan.innerText = 'FAIL';
                contentDiv.innerHTML = err.message;
            }
        }
    </script>
</body>
</html>
